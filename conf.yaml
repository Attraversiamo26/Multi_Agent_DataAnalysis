agents:
  capabilities:
    analysis_agent:
      capabilities:
      - Compute/analyze data returned from other agents
      - 'Aggregations: sum, avg, count, group statistics'
      - 'Comparisons: WoW/YoY, growth rate, variance'
      - 'Derived metrics: ratios, shares, rankings, trends'
      - 'Data processing: cleaning, formatting, filtering, sorting'
      note: This agent only analyzes with Python code; it does not directly fetch
        data
    search_agent:
      capabilities:
      - Analyze volume, time and order data - Calculate on-time rate and delay rate
      - Perform statistical analysis (mean, median, standard deviation)
      - Analyze time series data and trends
      - Calculate route performance metrics
      - Support complex data filtering and grouping
      - Generate statistical summaries and reports
    visualization_agent:
      capabilities:
      - Create bar charts for route on-time rates
      - Generate line charts for daily/weekly/monthly trends
      - Create histograms for delay time distribution
      - Generate pie charts for on-time vs delay ratios
      - Create scatter plots for volume vs on-time rate
      - Support heat maps for geographic analysis
      - Generate box plots for time distribution analysis
      - Create combination charts for comprehensive analysis
    generate_agent:
      capabilities:
      - Analyze writing style from historical documents
      - Generate reflection texts based on identified style
      - Support topic, word limit, and outline parameters
      - Save generated content to files
      - Ensure consistency with historical document style
    manage_agent:
      capabilities:
      - List documents in the document directory
      - Upload documents of various formats (docx/txt/xlsx/ppt/md/py/csv)
      - Delete documents
      - Preview document content for different formats
      - Manage document storage and organization
    knowledge_agent:
      capabilities:
      - Add web links to the knowledge base
      - Automatically read and summarize web page content
      - Categorize and manage knowledge links
      - Search links by keywords and categories
      - Retrieve link summaries and details
  data_sources:
    search_agent:
      data:
      - 快包对标线路清单（2025年11月）.xlsx
      - 特快时效产品对标线路清单（2025年11月）.xlsx
      - 特快对标线路清单（2025年11月）.xlsx
      - 特快对标测试数据.csv
      tables: []
